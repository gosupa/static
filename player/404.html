            <div class="content_wrap content_wrap_player_wrap">

                  <video id="video" class="video-js vjs-theme-city" controls="" crossorigin="" playsinline=""></video>

      <link rel="stylesheet" href="player.css">
      <link href="https://unpkg.com/video.js@7/dist/video-js.min.css" rel="stylesheet">
      <link href="https://unpkg.com/@videojs/themes@1/dist/city/index.css" rel="stylesheet">
      <link rel="stylesheet" href="hls-player.css">
      <script src="player.js"></script>

	  <script>
		function waitForHlsPlayer(callback, timeout = 10000) {
  			const startTime = Date.now();

  			const interval = setInterval(() => {
    			if (typeof window.START_HLS_PLAYER === 'function') {
      				clearInterval(interval);
      				callback(window.START_HLS_PLAYER);
    			} else if (Date.now() - startTime > timeout) {
      				clearInterval(interval);
      				console.error('START_HLS_PLAYER did not load within timeout');
    				}
  				}, 100);
			}

			window.addEventListener('load', () => {
			  	if (typeof window.START_HLS_PLAYER === 'function') {
    				window.START_HLS_PLAYER("https://cdn-prod.supareels.io/streams/tv/47ac71a8-4ddb-11f1-b1cb-ea100e442d41/master.m3u8");
  				} else {
    				waitForHlsPlayer((playerFn) => {
      					playerFn();
    				});
  				}
			});
	  </script>
   </body>
