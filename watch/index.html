<!DOCTYPE html>
<html lang="en">
   <head>
      <link rel="stylesheet" href="styles/tools.css">
   </head>
   <body>
      <div class="header section_wrap" style="height:auto;justify-content:flex-start;">
         <div class="container section_layout section_layout_feature section_layout_vertical">

            <div class="content_wrap content_wrap_player_wrap">
               <div class="player-wrap">
                  <video id="video" class="video-js vjs-theme-city" controls="" crossorigin="" playsinline=""></video>
               </div>
            </div>
         </div>
      </div>

      <link rel="stylesheet" href="styles/player.css">
      <link href="styles/video-js.min.css" rel="stylesheet">
      <link href="styles/index.css" rel="stylesheet">
      <link rel="stylesheet" href="styles/hls-player.css">
      <script src="scripts/player.js"></script>

	  <script>
		function waitForHlsPlayer(callback, timeout = 10000) {
  			const startTime = Date.now();

  			const interval = setInterval(() => {
    			if (typeof window.START_HLS_PLAYER === 'function') {
      				clearInterval(interval);
      				callback(window.START_HLS_PLAYER);
    			} else if (Date.now() - startTime > timeout) {
      				clearInterval(interval);
      				console.error('START_HLS_PLAYER did not load within timeout');
    				}
  				}, 100);
			}

			window.addEventListener('load', () => {
			  	if (typeof window.START_HLS_PLAYER === 'function') {
					var [type, viewerId] = window.location.hash.substring(1).split('/');
					var playlist = 'index.m3u8';
					if (type === 'tv') {
						playlist = 'master.m3u8';
					} else if (type === 'radio') {
						playlist = 'audio.m3u8';
					}
					// type = "tv";
					// viewerId = "442598c6-6a35-11f1-92a5-ce4f3d067d8b";
					// playlist = "master.m3u8";
    				window.START_HLS_PLAYER(`https://cdn-redirection-service.external.gosupa.org:8080/streams/${type}/${viewerId}/${playlist}`);
  				} else {
    				waitForHlsPlayer((playerFn) => {
      					playerFn();
    				});
  				}
			});
	  </script>
   </body>
</html>
